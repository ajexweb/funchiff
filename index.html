<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- PWA & Mobile App-Like Optimization (No Zooming allowed for gamers) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A1428" /> <!-- Navy Blue Browser Tab Color -->
    
    <!-- SEO & Premium Branding -->
    <title>Funchi FF - Premium Settings</title>
    <meta name="description" content="Get the best Free Fire Max custom sensitivity and HUD settings. Premium panel for optimal gameplay and drag headshots." />
    <meta name="keywords" content="Funchi FF, Free Fire Max, Sensitivity, Custom HUD, Gaming Settings, Cyber Funchi" />
    
    <!-- Open Graph (For beautiful link previews on WhatsApp/Discord/Instagram) -->
    <meta property="og:title" content="Funchi FF - Premium Panel" />
    <meta property="og:description" content="Exclusive Free Fire Max settings for your specific device. No bans, just pure performance." />
    <meta property="og:type" content="website" />
    <meta property="og:color" content="#0A1428" />
  </head>

  <!-- Default Navy Blue Background applied directly to body to prevent white flashes -->
  <body class="bg-[#0A1428] text-white overflow-x-hidden antialiased">
    
    <!-- Fallback if user's browser has JavaScript disabled -->
    <noscript>
      <div style="background-color: #001233; color: white; padding: 20px; text-align: center; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center;">
        Please enable JavaScript to access the Funchi FF Premium Panel.
      </div>
    </noscript>

    <!-- React Root Mount Point with Advanced Pre-Loader -->
    <div id="root">
      <!-- यह लोडर तब तक दिखेगा जब तक React (main.jsx) बैकग्राउंड में लोड नहीं हो जाता -->
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; background-color: #0A1428;">
        <h1 style="color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: 800; font-size: 2.5rem; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);">
          FUNCHI FF
        </h1>
        <div style="width: 50px; height: 50px; border: 4px solid #1A2A4A; border-top: 4px solid #FFFFFF; border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 15px rgba(255,255,255,0.1);"></div>
        <style>
          @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
      </div>
    </div>

    <!-- Flat File Structure Script Connection (No folders used) -->
    <script type="module" src="/main.jsx"></script>
    
  </body>
</html>
